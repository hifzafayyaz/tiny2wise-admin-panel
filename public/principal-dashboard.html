<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny2Wise | Principal Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7f6;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      color: #18202f;
    }
    p {
      color: #667085;
      line-height: 1.7;
    }
    button {
      margin-top: 16px;
      border: none;
      background: #15e97f;
      color: #062417;
      font-weight: 800;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Principal Sign In Successful</h1>
    <p>
      Welcome to Tiny2Wise. Your principal account has been authenticated successfully.
    </p>
    <button onclick="window.location.href='/signin'">Back to Sign In</button>
  </div>
</body>
</html>
